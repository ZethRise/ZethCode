name: build-windows

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a draft GitHub release'
        type: boolean
        required: false
        default: false
      version:
        description: 'Release version (optional, e.g. 1.0.0. If empty, uses version from package.json)'
        type: string
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    env:
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}\.bun-cache
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x64-baseline, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build SDK
        run: bun run ./packages/sdk/js/script/build.ts

      - name: Run build script
        run: bun run ./packages/opencode/script/build.ts --os=windows --arch=${{ matrix.arch }}

      - name: Rename Executable
        shell: pwsh
        run: |
          Copy-Item "packages/opencode/dist/zethcode-windows-${{ matrix.arch }}/bin/zeth.exe" "packages/opencode/dist/zethcode-windows-${{ matrix.arch }}.exe" -Force

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zethcode-windows-${{ matrix.arch }}
          path: |
            packages/opencode/dist/zethcode-windows-${{ matrix.arch }}.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event.inputs.create_release == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'failed')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(jq -r .version packages/opencode/package.json)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Draft Release and Upload Binaries
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          echo "Checking if release $TAG exists..."
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Creating draft release $TAG..."
            gh release create "$TAG" -d --title "$TAG" --target "${{ github.sha }}" --repo "${{ github.repository }}"
          else
            echo "Release $TAG already exists."
          fi
          
          echo "Uploading Windows build artifacts to release $TAG..."
          find ./artifacts -name "*.exe" -print0 | xargs -0 -I {} gh release upload "$TAG" "{}" --clobber --repo "${{ github.repository }}"
