name: build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a draft GitHub release"
        type: boolean
        required: false
        default: false
      version:
        description: "Release version (optional, e.g. 1.0.6. If empty, uses version from package.json)"
        type: string
        required: false
        default: "1.0.6"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: x64-baseline
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build SDK
        run: bun run ./packages/sdk/js/script/build.ts

      - name: Set build version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(bun -e "console.log(require('./packages/opencode/package.json').version)")
          fi
          echo "ZETHCODE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Run build script
        run: bun run ./packages/opencode/script/build.ts --os=linux --arch=${{ matrix.arch }}

      - name: Package .deb and .AppImage
        run: |
          chmod +x ./packages/opencode/script/package-linux.sh
          ./packages/opencode/script/package-linux.sh "${{ matrix.arch }}" "${ZETHCODE_VERSION}"

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zethcode-linux-${{ matrix.arch }}
          path: |
            packages/opencode/dist/zethcode-linux-${{ matrix.arch }}.deb
            packages/opencode/dist/zethcode-linux-${{ matrix.arch }}.AppImage

      - name: Package musl archive
        shell: bash
        run: |
          tar -C "packages/opencode/dist/zethcode-linux-${{ matrix.arch }}-musl/bin" -czf "packages/opencode/dist/zethcode-linux-${{ matrix.arch }}-musl.tar.gz" .

      - name: Upload Linux musl archive
        uses: actions/upload-artifact@v4
        with:
          name: zethcode-linux-${{ matrix.arch }}-musl
          path: packages/opencode/dist/zethcode-linux-${{ matrix.arch }}-musl.tar.gz

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x64
            runner: macos-26-intel
          - arch: x64-baseline
            runner: macos-26-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build SDK
        run: bun run ./packages/sdk/js/script/build.ts

      - name: Set build version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(bun -e "console.log(require('./packages/opencode/package.json').version)")
          fi
          echo "ZETHCODE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Run build script
        run: bun run ./packages/opencode/script/build.ts --os=darwin --arch=${{ matrix.arch }}

      - name: Package macOS archive
        shell: bash
        run: |
          tar -C "packages/opencode/dist/zethcode-darwin-${{ matrix.arch }}/bin" -czf "packages/opencode/dist/zethcode-darwin-${{ matrix.arch }}.tar.gz" .

      - name: Upload macOS archive
        uses: actions/upload-artifact@v4
        with:
          name: zethcode-darwin-${{ matrix.arch }}
          path: packages/opencode/dist/zethcode-darwin-${{ matrix.arch }}.tar.gz

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    env:
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}\.bun-cache
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x64-baseline, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build SDK
        run: bun run ./packages/sdk/js/script/build.ts

      - name: Set build version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(bun -e "console.log(require('./packages/opencode/package.json').version)")
          fi
          echo "ZETHCODE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Run build script
        run: bun run ./packages/opencode/script/build.ts --os=windows --arch=${{ matrix.arch }}

      - name: Rename Executable
        shell: pwsh
        run: |
          Copy-Item "packages/opencode/dist/zethcode-windows-${{ matrix.arch }}/bin/zeth.exe" "packages/opencode/dist/zethcode-windows-${{ matrix.arch }}.exe" -Force

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zethcode-windows-${{ matrix.arch }}
          path: |
            packages/opencode/dist/zethcode-windows-${{ matrix.arch }}.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event.inputs.create_release == 'true' &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(jq -r .version packages/opencode/package.json)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Draft Release and Upload Binaries
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          echo "Checking if release $TAG exists..."
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Creating draft release $TAG..."
            gh release create "$TAG" -d --title "$TAG" --target "${{ github.sha }}" --repo "${{ github.repository }}"
          else
            echo "Release $TAG already exists."
          fi

          echo "Uploading build artifacts to release $TAG..."
          find ./artifacts \( -name "*.deb" -o -name "*.AppImage" -o -name "*.exe" -o -name "*.tar.gz" \) -print0 | xargs -0 -I {} gh release upload "$TAG" "{}" --clobber --repo "${{ github.repository }}"
