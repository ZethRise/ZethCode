name: "Setup Bun"
description: "Setup Bun, cache dependencies, and install"
runs:
  using: "composite"
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Cache Bun dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          ~/AppData/Local/.bun/install/cache
          .bun-cache
        key: ${{ runner.os }}-bun-${{ hashFiles('package.json', '**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install node-gyp for native dependencies
      if: runner.os == 'Windows'
      run: npm install -g node-gyp@12.3.0
      shell: bash

    - name: Install dependencies
      run: bun install
      shell: bash
